# nginx site config for the Angular SPA.
# Serves the static build and falls back to index.html so client-side routes
# (deep links / refresh) resolve instead of 404ing.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets (Angular uses outputHashing=all in prod).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unmatched path returns index.html (no caching on the shell).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
